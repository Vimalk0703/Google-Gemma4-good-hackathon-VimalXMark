name: CI

on:
  push:
    branches: [main, enhancements]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python — ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ruff and mypy
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check malaika/ tests/
      - name: Ruff format check
        run: ruff format --check malaika/ tests/
      - name: Mypy
        run: mypy malaika/ --ignore-missing-imports || true
        # NOTE: mypy --strict is the local standard but requires the full dep
        # tree (transformers, torch). CI runs a lighter check; full strict
        # is enforced in the local pre-commit hook.

  python-tests:
    name: Python — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install only the deps needed for tests that don't need GPU
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
      - name: Run tests excluding GPU-required
        run: |
          pytest tests/ -v -m "not gpu_required" --cov=malaika \
            --cov-report=term-missing --cov-report=xml || true
        # Allowed to fail until the GPU-free dependency surface is stable;
        # remove the trailing `|| true` once requirements-test.txt is wired up.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  flutter-analyze:
    name: Flutter — analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true
      - name: Pub get
        working-directory: malaika_flutter
        run: flutter pub get
      - name: Analyze
        working-directory: malaika_flutter
        run: flutter analyze
      - name: Format check
        working-directory: malaika_flutter
        run: dart format --set-exit-if-changed lib/ || true

  web-build:
    name: Web — lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci || npm install
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        env:
          BREATH_API_URL: "http://placeholder.invalid"
          PORTAL_PASSCODE: "ci-placeholder"
        run: npm run build
