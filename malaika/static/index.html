<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a1628">
    <title>Malaika — Child Health AI</title>
    <style>
        :root{--pri:#4fc3f7;--bg:#0a1628;--sf:#132039;--tx:#e0e6ed;--txm:#7b8fa3;--ubbl:#1e88e5;--bbbl:#132039;--grn:#66bb6a;--ylw:#ffca28;--red:#ef5350;--font:'Segoe UI',system-ui,-apple-system,sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);color:var(--tx);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
        .hdr{padding:10px 16px 6px;text-align:center;flex-shrink:0}
        .hdr h1{font-size:1.1em;color:var(--pri);font-weight:600}
        .hdr p{font-size:.68em;color:var(--txm)}

        .orb-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 0 8px;flex-shrink:0}
        .orb{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;border:2px solid rgba(79,195,247,.25);background:rgba(79,195,247,.08)}
        .orb:hover{border-color:var(--pri);transform:scale(1.05)}
        .orb.listening{border-color:rgba(102,187,106,.6);background:rgba(102,187,106,.12);animation:glow-g 2s infinite}
        .orb.thinking{border-color:rgba(255,202,40,.6);background:rgba(255,202,40,.12)}
        .orb.thinking .oi{animation:spin 1.5s linear infinite}
        .orb.speaking{border-color:rgba(79,195,247,.6);background:rgba(79,195,247,.12);animation:breathe 1.2s ease-in-out infinite}
        .oi{font-size:32px}
        .olbl{font-size:.72em;color:var(--txm);margin-top:6px}
        .osub{display:flex;gap:8px;margin-top:6px}
        .osub button{padding:4px 14px;border-radius:16px;border:1px solid rgba(239,83,80,.4);background:none;color:var(--red);font-size:.7em;cursor:pointer}

        .chat{flex:1;overflow-y:auto;padding:6px 14px;-webkit-overflow-scrolling:touch}
        .chat::-webkit-scrollbar{width:3px}
        .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
        .msg{display:flex;margin-bottom:6px;animation:fadeIn .25s ease}
        .msg.user{justify-content:flex-end}
        .bbl{max-width:85%;padding:9px 13px;border-radius:16px;font-size:.87em;line-height:1.5;word-wrap:break-word}
        .msg.user .bbl{background:var(--ubbl);color:#fff;border-bottom-right-radius:4px}
        .msg.bot .bbl{background:var(--bbbl);border:1px solid rgba(255,255,255,.06);color:var(--tx);border-bottom-left-radius:4px}
        .bbl img{max-width:100%;border-radius:8px;margin:4px 0}
        .bbl strong{color:var(--pri)}
        .dots{display:flex;gap:4px;padding:12px 16px}
        .dots span{width:6px;height:6px;border-radius:50%;background:var(--txm);animation:bounce 1.4s infinite both}
        .dots span:nth-child(2){animation-delay:.2s}
        .dots span:nth-child(3){animation-delay:.4s}

        .bar{display:flex;align-items:center;gap:6px;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--sf);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
        .bar .b{width:42px;height:42px;border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0;background:rgba(255,255,255,.06);color:var(--txm);transition:all .15s}
        .bar .b:hover{background:rgba(255,255,255,.12);color:var(--tx)}
        .bar input{flex:1;height:42px;padding:0 12px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:var(--bg);color:var(--tx);font-size:16px;font-family:var(--font);outline:none}
        .bar input:focus{border-color:var(--pri)}
        .bar input::placeholder{color:var(--txm)}
        .bar .send{background:var(--pri)!important;color:var(--bg)!important}

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;flex-direction:column;align-items:center;justify-content:center}
        .modal.vis{display:flex}
        .modal video{width:90%;max-width:480px;max-height:55vh;border-radius:12px;object-fit:cover}
        .modal canvas{display:none}
        .modal .mc{display:flex;gap:16px;margin-top:16px}
        .modal .mb{width:56px;height:56px;border-radius:50%;border:2px solid #fff;background:none;color:#fff;font-size:20px;cursor:pointer}
        .modal .mb.cap{background:#fff;color:var(--bg)}

        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
        @keyframes glow-g{0%,100%{box-shadow:0 0 0 0 rgba(102,187,106,.3)}50%{box-shadow:0 0 0 10px rgba(102,187,106,0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @media(min-width:600px){.chat{padding:10px 15%}.bbl{max-width:65%}}
    </style>
</head>
<body>
    <div class="hdr"><h1>Malaika</h1><p>WHO IMCI Child Health AI &middot; Gemma 4</p></div>
    <div class="orb-wrap">
        <div class="orb" id="orb"><span class="oi" id="oi">&#127908;</span></div>
        <div class="olbl" id="olbl">Tap to start</div>
        <div class="osub" id="osub" style="display:none"><button onclick="endSession()">End</button></div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="bar">
        <button class="b" onclick="document.getElementById('fi').click()">&#128206;</button>
        <button class="b" onclick="openCam()">&#128247;</button>
        <input type="text" id="ti" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendTyped();}">
        <button class="b send" onclick="sendTyped()">&#10148;</button>
    </div>
    <input type="file" id="fi" accept="image/*" capture="environment" style="display:none" onchange="uploadFile(this)">
    <div class="modal" id="cm"><video id="cv" autoplay playsinline></video><canvas id="cc"></canvas><div class="mc"><button class="mb" onclick="closeCam()">&#10005;</button><button class="mb cap" onclick="snapCam()">&#128248;</button></div></div>

<script>
(function(){
'use strict';

var chat=document.getElementById('chat'),ti=document.getElementById('ti');
var orb=document.getElementById('orb'),oi=document.getElementById('oi'),olbl=document.getElementById('olbl'),osub=document.getElementById('osub');
var ws=null,micStream=null,audioCtx=null,processor=null,playbackCtx=null;
var state='idle',speaking=false,speechFrames=0,silenceFrames=0;
var camStream=null;

// ── State ──
function setState(s){
    state=s;orb.className='orb '+s;
    var ic={idle:'\u{1F3A4}',listening:'\u{1F3A4}',thinking:'\u{23F3}',speaking:'\u{1F50A}'};
    var lb={idle:'Tap to talk',listening:'Listening...',thinking:'Thinking...',speaking:'Speaking...'};
    oi.textContent=ic[s]||ic.idle;olbl.textContent=lb[s]||'';
    osub.style.display=s!=='idle'?'flex':'none';
}

// ── WebSocket Connection ──
function connect(){
    var proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/api/voice-stream');
    ws.binaryType='arraybuffer';

    ws.onopen=function(){console.log('WS connected');};

    ws.onmessage=function(e){
        if(typeof e.data==='string'){
            var msg=JSON.parse(e.data);
            if(msg.type==='state') setState(msg.state);
            else if(msg.type==='transcript'){
                if(msg.role==='user') updateOrAddMsg('user',msg.text);
                else addMsg('bot',msg.text);
            }
            else if(msg.type==='audio') playAudioChunk(msg.data);
            else if(msg.type==='audio_end'){/* playback handled by onended */}
            else if(msg.type==='error') addMsg('bot','Error: '+msg.message);
        }
    };

    ws.onerror=function(){addMsg('bot','Connection lost. Refresh to reconnect.');};
    ws.onclose=function(){setState('idle');};
}

// ── Orb tap — start/stop mic ──
var started=false;
orb.onclick=function(){
    if(!started){
        started=true;
        connect();
        startMic();
        return;
    }
    if(state==='listening'){
        // User finished speaking — send speech_end
        ws.send(JSON.stringify({type:'speech_end'}));
    } else if(state==='idle'){
        startMic();
    }
};

window.endSession=function(){
    stopMic();
    if(ws)ws.close();
    setState('idle');
    started=false;
};

// ── Mic Capture — continuous audio streaming ──
async function startMic(){
    try{
        micStream=await navigator.mediaDevices.getUserMedia({
            audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}
        });
        var nativeSR=micStream.getAudioTracks()[0].getSettings().sampleRate||44100;
        audioCtx=new AudioContext({sampleRate:nativeSR});
        var src=audioCtx.createMediaStreamSource(micStream);
        processor=audioCtx.createScriptProcessor(4096,1,1);
        var ratio=16000/nativeSR;

        speaking=false;speechFrames=0;silenceFrames=0;

        processor.onaudioprocess=function(e){
            if(!ws||ws.readyState!==1)return;
            var input=e.inputBuffer.getChannelData(0);

            // VAD
            var energy=0;
            for(var i=0;i<input.length;i++)energy+=input[i]*input[i];
            energy=Math.sqrt(energy/input.length);

            if(energy>0.008){
                speechFrames++;silenceFrames=0;
                if(!speaking&&speechFrames>=3){
                    speaking=true;
                    ws.send(JSON.stringify({type:'speech_start'}));
                }
            }else{
                silenceFrames++;speechFrames=0;
                if(speaking&&silenceFrames>=25){
                    speaking=false;
                    ws.send(JSON.stringify({type:'speech_end'}));
                }
            }

            // Stream audio when speaking
            if(speaking){
                var outLen=Math.round(input.length*ratio);
                var pcm=new Int16Array(outLen);
                for(var j=0;j<outLen;j++){
                    var si=Math.min(Math.round(j/ratio),input.length-1);
                    // Gain boost (echo cancellation suppresses mic)
                    var sample=input[si]*4.0;
                    pcm[j]=Math.max(-32768,Math.min(32767,Math.round(sample*32767)));
                }
                ws.send(pcm.buffer);
            }
        };

        src.connect(processor);
        processor.connect(audioCtx.destination);
    }catch(err){
        addMsg('bot','Microphone access needed. Please allow and try again.');
    }
}

function stopMic(){
    if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
    if(processor){processor.disconnect();processor=null;}
    if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null;}
}

// ── Audio Playback ──
function playAudioChunk(base64Data){
    if(!playbackCtx)playbackCtx=new AudioContext({sampleRate:24000});

    // Decode base64 to bytes
    var raw=atob(base64Data);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);

    // Check if it's already a WAV (starts with RIFF)
    var isWav=(bytes.length>4 && bytes[0]===0x52 && bytes[1]===0x49 && bytes[2]===0x46 && bytes[3]===0x46);

    var audioBytes;
    if(isWav){
        audioBytes=bytes.buffer.slice(0);
    }else{
        // Raw PCM — wrap in WAV header
        audioBytes=pcmToWav(bytes,24000);
    }

    playbackCtx.decodeAudioData(audioBytes).then(function(decoded){
        var src=playbackCtx.createBufferSource();
        src.buffer=decoded;
        src.connect(playbackCtx.destination);
        src.start();
    }).catch(function(err){
        console.log('Audio playback error:',err);
    });
}

function pcmToWav(pcmBytes,sr){
    var pcmLen=pcmBytes.length;
    var buf=new ArrayBuffer(44+pcmLen);
    var v=new DataView(buf);
    var o=new Uint8Array(buf);
    function s(off,str){for(var i=0;i<str.length;i++)v.setUint8(off+i,str.charCodeAt(i));}
    s(0,'RIFF');v.setUint32(4,36+pcmLen,true);s(8,'WAVE');s(12,'fmt ');
    v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
    v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
    v.setUint16(34,16,true);s(36,'data');v.setUint32(40,pcmLen,true);
    o.set(pcmBytes,44);
    return buf;
}

// ── Chat Rendering ──
var lastUserEl=null;
function addMsg(role,text,imgUrl){
    var m=document.createElement('div');m.className='msg '+role;
    var b=document.createElement('div');b.className='bbl';
    if(imgUrl){var img=document.createElement('img');img.src=imgUrl;b.appendChild(img);}
    if(text){var d=document.createElement('div');d.innerHTML=md(text);b.appendChild(d);}
    m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
    if(role==='user')lastUserEl=b;
    return m;
}

function updateOrAddMsg(role,text){
    if(role==='user'&&lastUserEl){
        lastUserEl.innerHTML=md(text);
        chat.scrollTop=chat.scrollHeight;
    }else{
        addMsg(role,text);
    }
}

var dotsEl=null;
function showDots(){dotsEl=document.createElement('div');dotsEl.className='msg bot';dotsEl.innerHTML='<div class="bbl dots"><span></span><span></span><span></span></div>';chat.appendChild(dotsEl);chat.scrollTop=chat.scrollHeight;}
function hideDots(){if(dotsEl){dotsEl.remove();dotsEl=null;}}

function md(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>');}

// ── Text input ──
window.sendTyped=function(){
    var text=ti.value.trim();if(!text)return;ti.value='';
    if(!started){started=true;connect();}
    if(ws&&ws.readyState===1){
        addMsg('user',text);lastUserEl=null;
        ws.send(JSON.stringify({type:'text',text:text}));
    }
};

// ── Image upload ──
window.uploadFile=function(input){
    var f=input.files[0];if(!f)return;input.value='';
    var reader=new FileReader();
    reader.onload=function(){
        var b64=reader.result.split(',')[1];
        addMsg('user','',URL.createObjectURL(f));
        if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'image',data:b64}));
    };
    reader.readAsDataURL(f);
};

// ── Camera ──
window.openCam=async function(){
    try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640}}});
    document.getElementById('cv').srcObject=camStream;document.getElementById('cm').classList.add('vis');
    }catch(e){document.getElementById('fi').click();}
};
window.snapCam=function(){
    var v=document.getElementById('cv'),c=document.getElementById('cc');
    c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);
    c.toBlob(function(blob){
        var url=c.toDataURL('image/jpeg',.85);closeCam();
        var reader=new FileReader();
        reader.onload=function(){
            var b64=reader.result.split(',')[1];
            addMsg('user','',url);
            if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'image',data:b64}));
        };
        reader.readAsDataURL(blob);
    },'image/jpeg',.85);
};
window.closeCam=function(){document.getElementById('cm').classList.remove('vis');if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}};

// ── Init ──
addMsg('bot','Tap the circle above to start your child\u2019s health check.');

})();
</script>
</body>
</html>
