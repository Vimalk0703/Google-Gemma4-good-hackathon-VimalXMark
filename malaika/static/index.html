<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a1628">
    <title>Malaika — Child Health AI</title>
    <style>
        :root {
            --primary: #4fc3f7;
            --primary-glow: rgba(79,195,247,0.3);
            --bg: #0a1628;
            --surface: #132039;
            --text: #e0e6ed;
            --text-muted: #7b8fa3;
            --user-bubble: #1e88e5;
            --bot-bubble: #132039;
            --green: #66bb6a;
            --yellow: #ffca28;
            --red: #ef5350;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

        .header { padding: 10px 16px 6px; text-align: center; flex-shrink: 0; }
        .header h1 { font-size: 1.1em; color: var(--primary); font-weight: 600; }
        .header p { font-size: 0.68em; color: var(--text-muted); }

        /* Orb */
        .orb-area { display: flex; flex-direction: column; align-items: center; padding: 12px 0; flex-shrink: 0; }
        .orb { width: 96px; height: 96px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; position: relative; border: 2px solid rgba(79,195,247,0.25); background: rgba(79,195,247,0.08); }
        .orb:hover { border-color: var(--primary); transform: scale(1.05); }
        .orb.listening { border-color: rgba(102,187,106,0.6); background: rgba(102,187,106,0.12); animation: pulse-ring 2s infinite; }
        .orb.thinking { border-color: rgba(255,202,40,0.6); background: rgba(255,202,40,0.12); }
        .orb.thinking .orb-icon { animation: spin 1.5s linear infinite; }
        .orb.speaking { border-color: rgba(79,195,247,0.6); background: rgba(79,195,247,0.12); animation: breathe 1.2s ease-in-out infinite; }
        .orb-icon { font-size: 32px; }
        .orb-label { font-size: 0.72em; color: var(--text-muted); margin-top: 6px; }
        .orb-sub { display: flex; gap: 8px; margin-top: 6px; }
        .orb-sub button { padding: 4px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); font-size: 0.7em; cursor: pointer; }
        .orb-sub .end { border-color: rgba(239,83,80,0.4); color: var(--red); }

        /* Chat */
        .chat { flex: 1; overflow-y: auto; padding: 6px 14px; -webkit-overflow-scrolling: touch; }
        .chat::-webkit-scrollbar { width: 3px; }
        .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .msg { display: flex; margin-bottom: 6px; animation: fadeIn 0.25s ease; }
        .msg.user { justify-content: flex-end; }
        .bbl { max-width: 85%; padding: 9px 13px; border-radius: 16px; font-size: 0.87em; line-height: 1.5; word-wrap: break-word; }
        .msg.user .bbl { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot .bbl { background: var(--bot-bubble); border: 1px solid rgba(255,255,255,0.06); color: var(--text); border-bottom-left-radius: 4px; }
        .bbl img { max-width: 100%; border-radius: 8px; margin: 4px 0; }
        .bbl strong { color: var(--primary); }
        .bbl p { margin-bottom: 3px; }
        .dots { display: flex; gap: 4px; padding: 12px 16px; }
        .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.4s infinite both; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        /* Input */
        .bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .bar .btn { width: 42px; height: 42px; border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; background: rgba(255,255,255,0.06); color: var(--text-muted); transition: all 0.15s; }
        .bar .btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
        .bar input { flex: 1; height: 42px; padding: 0 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: var(--bg); color: var(--text); font-size: 16px; font-family: var(--font); outline: none; }
        .bar input:focus { border-color: var(--primary); }
        .bar input::placeholder { color: var(--text-muted); }
        .bar .mic { background: linear-gradient(135deg, var(--primary), #29b6f6); color: var(--bg); box-shadow: 0 2px 10px var(--primary-glow); }
        .bar .mic.rec { background: var(--red); box-shadow: 0 2px 10px rgba(239,83,80,0.3); animation: pulse-ring 1.5s infinite; }
        .bar .send { background: var(--primary); color: var(--bg); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .modal.vis { display: flex; }
        .modal video { width: 90%; max-width: 480px; max-height: 55vh; border-radius: 12px; object-fit: cover; }
        .modal canvas { display: none; }
        .modal .mc { display: flex; gap: 16px; margin-top: 16px; }
        .modal .mb { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #fff; background: none; color: #fff; font-size: 20px; cursor: pointer; }
        .modal .mb.cap { background: #fff; color: var(--bg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        @keyframes pulse-ring { 0%,100% { box-shadow: 0 0 0 0 rgba(79,195,247,0.25); } 50% { box-shadow: 0 0 0 10px rgba(79,195,247,0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @media (min-width: 600px) { .chat { padding: 10px 15%; } .bbl { max-width: 65%; } }
    </style>
</head>
<body>
    <div class="header"><h1>Malaika</h1><p>WHO IMCI Child Health AI &middot; Gemma 4</p></div>

    <div class="orb-area">
        <div class="orb" id="orb"><span class="orb-icon" id="orbIcon">&#127908;</span></div>
        <div class="orb-label" id="orbLabel">Tap to start</div>
        <div class="orb-sub" id="orbSub" style="display:none"><button class="end" onclick="endVoice()">End</button></div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="bar">
        <button class="btn" onclick="document.getElementById('fInput').click()">&#128206;</button>
        <button class="btn" onclick="openCam()">&#128247;</button>
        <input type="text" id="tIn" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){event.preventDefault();doSend();}">
        <button class="btn mic" id="micBtn" onclick="toggleMic()">&#127908;</button>
        <button class="btn send" onclick="doSend()">&#10148;</button>
    </div>

    <input type="file" id="fInput" accept="image/*" capture="environment" style="display:none" onchange="doFile(this)">

    <div class="modal" id="camModal">
        <video id="camV" autoplay playsinline></video>
        <canvas id="camC"></canvas>
        <div class="mc">
            <button class="mb" onclick="closeCam()">&#10005;</button>
            <button class="mb cap" onclick="snapCam()">&#128248;</button>
        </div>
    </div>

<script>
(function(){
'use strict';

var chat = document.getElementById('chat');
var tIn = document.getElementById('tIn');
var orb = document.getElementById('orb');
var orbIcon = document.getElementById('orbIcon');
var orbLabel = document.getElementById('orbLabel');
var orbSub = document.getElementById('orbSub');
var micBtn = document.getElementById('micBtn');

var VOICE = new URLSearchParams(location.search).get('voice') === '1';
var state = 'idle'; // idle|listening|thinking|speaking
var started = false;
var processing = false;
var recorder = null;
var chunks = [];
var camStream = null;
var playCtx = null;
var currentSrc = null;

// ── State ──
function setState(s) {
    state = s;
    orb.className = 'orb ' + s;
    var icons = {idle:'\u{1F3A4}',listening:'\u{1F3A4}',thinking:'\u{23F3}',speaking:'\u{1F50A}'};
    var labels = {idle:'Tap to talk',listening:'Listening... tap when done',thinking:'Thinking...',speaking:'Speaking...'};
    orbIcon.textContent = icons[s]||icons.idle;
    orbLabel.textContent = labels[s]||'';
    orbSub.style.display = s!=='idle'?'flex':'none';
    micBtn.className = 'btn mic' + (s==='listening'?' rec':'');
}

// ── Orb tap ──
orb.onclick = function() {
    if (!started) { started = true; initAudio(); doProcess('Hi'); return; }
    if (state==='idle') startRec();
    else if (state==='listening') stopRec();
};

window.toggleMic = function() { orb.onclick(); };
window.endVoice = function() { if(recorder){try{recorder.stop();}catch(e){}} setState('idle'); };

// ── Audio init (needs user gesture) ──
function initAudio() { if(!playCtx) playCtx = new AudioContext({sampleRate:24000}); }

// ── Record voice ──
function startRec() {
    navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}}).then(function(stream){
        chunks = [];
        var types = ['audio/webm;codecs=opus','audio/webm','audio/ogg'];
        var mime = '';
        for(var i=0;i<types.length;i++){if(MediaRecorder.isTypeSupported(types[i])){mime=types[i];break;}}
        recorder = new MediaRecorder(stream, mime?{mimeType:mime}:{});
        recorder.ondataavailable = function(e){if(e.data.size>0)chunks.push(e.data);};
        recorder.onstop = function(){
            var blob = new Blob(chunks, {type:recorder.mimeType});
            stream.getTracks().forEach(function(t){t.stop();});
            recorder = null;
            if(blob.size>500) sendVoice(blob);
            else setState('idle');
        };
        recorder.start();
        setState('listening');
    }).catch(function(){ addMsg('bot','Please allow microphone access.'); });
}

function stopRec() { if(recorder && recorder.state==='recording') recorder.stop(); }

// ── Send voice to server ──
async function sendVoice(blob) {
    setState('thinking');
    showDots();
    var fd = new FormData();
    fd.append('audio', blob, 'voice.webm');
    try {
        var res = await fetch('/api/voice', {method:'POST', body:fd});
        hideDots();
        if(res.ok){
            var d = await res.json();
            if(d.transcript) addMsg('user', d.transcript);
            addMsg('bot', d.response);
            speakTTS(d.response);
        } else {
            addMsg('bot','I had trouble understanding. Try again or type.');
            setState('idle');
        }
    } catch(e) {
        hideDots();
        addMsg('bot','Connection error. Please try again.');
        setState('idle');
    }
}

// ── Send text ──
window.doSend = async function() {
    var text = tIn.value.trim();
    if(!text||processing) return;
    tIn.value = '';
    if(!started){started=true;initAudio();}
    doProcess(text);
};

async function doProcess(text, imgUrl, imgBlob) {
    if(processing) return;
    processing = true;
    addMsg('user', text, imgUrl);
    setState('thinking');
    showDots();
    try {
        var d;
        if(imgBlob){
            var fd = new FormData();
            fd.append('image',imgBlob,'photo.jpg');
            fd.append('text',text||'');
            var r = await fetch('/api/image',{method:'POST',body:fd});
            d = await r.json();
        } else {
            var r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
            d = await r.json();
        }
        hideDots();
        addMsg('bot', d.response);
        speakTTS(d.response);
    } catch(e) {
        hideDots();
        addMsg('bot','Something went wrong. Please try again.');
        setState('idle');
    }
    processing = false;
}

// ── TTS ──
async function speakTTS(text) {
    if(!text){setState('idle');return;}
    setState('speaking');

    // Try server-side TTS (Smallest AI proxy or Piper)
    try {
        var clean = text.replace(/\*\*/g,'').replace(/#{1,3}\s/g,'').replace(/---/g,'').replace(/\n+/g,' ').substring(0,800);
        var fd = new FormData();
        fd.append('text', clean);
        var res = await fetch('/api/speak', {method:'POST', body:fd});
        if(res.ok) {
            var buf = await res.arrayBuffer();
            if(!playCtx) playCtx = new AudioContext({sampleRate:24000});
            // Try decoding as-is first
            try {
                var decoded = await playCtx.decodeAudioData(buf);
                currentSrc = playCtx.createBufferSource();
                currentSrc.buffer = decoded;
                currentSrc.connect(playCtx.destination);
                currentSrc.onended = function(){ currentSrc=null; setState('idle'); };
                currentSrc.start();
                return;
            } catch(decErr) {
                // Raw PCM — wrap in WAV header
                var wavBuf = pcmToWav(buf, 24000);
                var decoded2 = await playCtx.decodeAudioData(wavBuf);
                currentSrc = playCtx.createBufferSource();
                currentSrc.buffer = decoded2;
                currentSrc.connect(playCtx.destination);
                currentSrc.onended = function(){ currentSrc=null; setState('idle'); };
                currentSrc.start();
                return;
            }
        }
    } catch(e) { console.log('TTS error:', e); }

    // No TTS — just go idle
    setState('idle');
}

// PCM to WAV wrapper
function pcmToWav(pcmBuf, sampleRate) {
    var numSamples = pcmBuf.byteLength / 2;
    var buffer = new ArrayBuffer(44 + pcmBuf.byteLength);
    var view = new DataView(buffer);
    function s(o,v){for(var i=0;i<v.length;i++)view.setUint8(o+i,v.charCodeAt(i));}
    s(0,'RIFF'); view.setUint32(4,36+pcmBuf.byteLength,true); s(8,'WAVE');
    s(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
    view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
    view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true);
    view.setUint16(34,16,true); s(36,'data'); view.setUint32(40,pcmBuf.byteLength,true);
    new Uint8Array(buffer,44).set(new Uint8Array(pcmBuf));
    return buffer;
}

// ── Chat rendering ──
function addMsg(role, text, imgUrl) {
    var m = document.createElement('div');
    m.className = 'msg '+role;
    var b = document.createElement('div');
    b.className = 'bbl';
    if(imgUrl){var img=document.createElement('img');img.src=imgUrl;b.appendChild(img);}
    if(text){var d=document.createElement('div');d.innerHTML=md(text);b.appendChild(d);}
    m.appendChild(b);
    chat.appendChild(m);
    chat.scrollTop = chat.scrollHeight;
}

var dotsEl = null;
function showDots(){dotsEl=document.createElement('div');dotsEl.className='msg bot';dotsEl.innerHTML='<div class="bbl dots"><span></span><span></span><span></span></div>';chat.appendChild(dotsEl);chat.scrollTop=chat.scrollHeight;}
function hideDots(){if(dotsEl){dotsEl.remove();dotsEl=null;}}

function md(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>');}

// ── File upload ──
window.doFile = function(input) {
    var f = input.files[0]; if(!f)return;
    var url = URL.createObjectURL(f);
    if(!started){started=true;initAudio();}
    doProcess('', url, f);
    input.value = '';
};

// ── Camera ──
window.openCam = async function() {
    try {
        camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}});
        document.getElementById('camV').srcObject = camStream;
        document.getElementById('camModal').classList.add('vis');
    } catch(e) { document.getElementById('fInput').click(); }
};
window.snapCam = function() {
    var v=document.getElementById('camV'),c=document.getElementById('camC');
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    c.toBlob(function(blob){var url=c.toDataURL('image/jpeg',0.85);closeCam();if(!started){started=true;initAudio();}doProcess('',url,blob);},'image/jpeg',0.85);
};
window.closeCam = function() {
    document.getElementById('camModal').classList.remove('vis');
    if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
};

// ── Init ──
addMsg('bot','Tap the circle above to start your child\u2019s health check.');

})();
</script>
</body>
</html>
