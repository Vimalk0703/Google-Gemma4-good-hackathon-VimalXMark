<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a1628">
    <title>Malaika — Child Health AI</title>
    <style>
        :root {
            --primary: #4fc3f7;
            --primary-glow: rgba(79, 195, 247, 0.3);
            --accent: #81d4fa;
            --bg: #0a1628;
            --surface: #132039;
            --surface-light: #1a2d4d;
            --text: #e0e6ed;
            --text-muted: #7b8fa3;
            --user-bubble: #1e88e5;
            --bot-bubble: #132039;
            --green: #66bb6a;
            --yellow: #ffca28;
            --red: #ef5350;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            padding: 12px 16px 8px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 { font-size: 1.1em; color: var(--primary); font-weight: 600; letter-spacing: 0.5px; }
        .header p { font-size: 0.7em; color: var(--text-muted); margin-top: 2px; }

        /* Voice Orb */
        .orb-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 12px;
            flex-shrink: 0;
        }

        .orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .orb.idle {
            background: linear-gradient(135deg, rgba(79,195,247,0.15), rgba(79,195,247,0.05));
            border: 2px solid rgba(79,195,247,0.3);
        }
        .orb.idle:hover { border-color: var(--primary); transform: scale(1.05); }

        .orb.listening {
            background: rgba(102,187,106,0.15);
            border: 2px solid rgba(102,187,106,0.5);
            animation: pulse-green 2s infinite;
        }

        .orb.thinking {
            background: rgba(255,202,40,0.15);
            border: 2px solid rgba(255,202,40,0.5);
            animation: spin-slow 2s linear infinite;
        }

        .orb.speaking {
            background: rgba(79,195,247,0.15);
            border: 2px solid rgba(79,195,247,0.5);
            animation: breathe 1s ease-in-out infinite;
        }

        .orb .icon { font-size: 36px; }

        .orb-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            pointer-events: none;
        }

        .orb.listening .orb-ring {
            border-color: rgba(102,187,106,0.3);
            animation: ring-expand 2s infinite;
        }

        .orb-label {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: capitalize;
        }

        /* Voice Controls */
        .voice-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .voice-controls button {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 0.75em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .voice-controls button:hover { border-color: var(--primary); color: var(--primary); }
        .voice-controls .end-btn { border-color: rgba(239,83,80,0.3); color: var(--red); }
        .voice-controls .end-btn:hover { background: rgba(239,83,80,0.15); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
        }

        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.88em;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 10px;
            margin: 6px 0;
        }

        .bubble strong { color: var(--primary); font-weight: 600; }
        .bubble p { margin-bottom: 4px; }
        .bubble p:last-child { margin-bottom: 0; }

        .thinking-bubble {
            display: flex;
            gap: 4px;
            padding: 14px 20px;
        }

        .thinking-bubble span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s infinite both;
        }
        .thinking-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-bubble span:nth-child(3) { animation-delay: 0.4s; }

        /* Input Bar */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        .input-bar .btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--primary), #29b6f6);
            color: var(--bg);
            box-shadow: 0 2px 12px var(--primary-glow);
        }
        .mic-btn:hover { box-shadow: 0 4px 20px var(--primary-glow); transform: scale(1.05); }
        .mic-btn.active { background: var(--red); box-shadow: 0 2px 12px rgba(239,83,80,0.3); }

        .cam-btn, .upload-btn {
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .cam-btn:hover, .upload-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

        .input-bar input {
            flex: 1;
            height: 44px;
            padding: 0 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-family: var(--font);
            outline: none;
        }
        .input-bar input:focus { border-color: var(--primary); }
        .input-bar input::placeholder { color: var(--text-muted); }

        .send-btn {
            background: var(--primary) !important;
            color: var(--bg) !important;
        }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Camera Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal.visible { display: flex; }
        .modal video { width: 90%; max-width: 480px; max-height: 60vh; border-radius: 12px; object-fit: cover; }
        .modal canvas { display: none; }
        .modal .modal-controls { display: flex; gap: 16px; margin-top: 16px; }
        .modal .modal-btn {
            width: 56px; height: 56px; border-radius: 50%; border: 2px solid white;
            background: transparent; color: white; font-size: 22px; cursor: pointer;
        }
        .modal .modal-btn.capture { background: white; color: var(--bg); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(102,187,106,0.3); } 50% { box-shadow: 0 0 0 12px rgba(102,187,106,0); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        @keyframes ring-expand { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }

        @media (min-width: 600px) {
            .chat-area { padding: 12px 15%; }
            .bubble { max-width: 65%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Malaika</h1>
        <p>WHO IMCI Child Health AI &middot; Gemma 4</p>
    </div>

    <div class="orb-container" id="orbContainer">
        <div class="orb idle" id="orb" onclick="toggleVoice()">
            <div class="orb-ring"></div>
            <span class="icon" id="orbIcon">&#127908;</span>
        </div>
        <div class="orb-label" id="orbLabel">Tap to start voice</div>
        <div class="voice-controls" id="voiceControls" style="display:none">
            <button class="end-btn" onclick="stopVoice()">End Voice</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-bar">
        <button class="btn upload-btn" onclick="document.getElementById('fileInput').click()" title="Upload image">&#128206;</button>
        <button class="btn cam-btn" onclick="openCamera()" title="Camera">&#128247;</button>
        <input type="text" id="textInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()">
        <button class="btn mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice">&#127908;</button>
        <button class="btn send-btn" onclick="sendText()" title="Send">&#10148;</button>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(this)">

    <div class="modal" id="cameraModal">
        <video id="camVideo" autoplay playsinline></video>
        <canvas id="camCanvas"></canvas>
        <div class="modal-controls">
            <button class="modal-btn" onclick="closeCamera()">&#10005;</button>
            <button class="modal-btn capture" onclick="capturePhoto()">&#128248;</button>
        </div>
    </div>

<script>
(function() {
    'use strict';

    /* ================================================================
     * Configuration
     * ================================================================ */

    // Voice routes through our backend (handles auth + CORS)
    var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var STT_WS_URL = wsProto + '//' + location.host + '/api/stt';
    var TTS_URL = '/api/speak';
    var VOICE_ENABLED = new URLSearchParams(window.location.search).get('voice') === '1';

    /* ================================================================
     * State
     * ================================================================ */

    var voiceState = 'idle'; // idle | listening | thinking | speaking
    var isProcessing = false;
    var sttSocket = null;
    var sttStream = null;
    var sttAudioCtx = null;
    var sttProcessor = null;
    var isSpeechActive = false;
    var silenceFrames = 0;
    var speechFrames = 0;
    var currentSource = null;
    var playbackCtx = null;
    var cameraStream = null;

    /* ================================================================
     * DOM
     * ================================================================ */

    var chatArea = document.getElementById('chatArea');
    var textInput = document.getElementById('textInput');
    var orb = document.getElementById('orb');
    var orbIcon = document.getElementById('orbIcon');
    var orbLabel = document.getElementById('orbLabel');
    var voiceControls = document.getElementById('voiceControls');
    var micBtn = document.getElementById('micBtn');

    /* ================================================================
     * Voice State Management
     * ================================================================ */

    function setVoiceState(state) {
        voiceState = state;
        orb.className = 'orb ' + state;

        var icons = { idle: '\u{1F3A4}', listening: '\u{1F3A4}', thinking: '\u{23F3}', speaking: '\u{1F50A}' };
        var labels = { idle: 'Tap to start voice', listening: 'Listening...', thinking: 'Thinking...', speaking: 'Speaking...' };
        orbIcon.textContent = icons[state] || icons.idle;
        orbLabel.textContent = labels[state] || '';

        voiceControls.style.display = (state !== 'idle') ? 'flex' : 'none';
        micBtn.className = 'btn mic-btn' + (state === 'listening' ? ' active' : '');
    }

    window.stopVoice = function() {
        stopListening();
        stopSpeaking();
        setVoiceState('idle');
    };

    /* ================================================================
     * Smallest AI STT — Real-time Speech-to-Text
     * ================================================================ */

    async function startListening() {
        if (!VOICE_ENABLED) {
            startPushToTalk();
            return;
        }

        try {
            sttStream = await navigator.mediaDevices.getUserMedia({
                audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
            });

            var nativeSR = sttStream.getAudioTracks()[0].getSettings().sampleRate || 44100;
            sttAudioCtx = new AudioContext({ sampleRate: nativeSR });
            var source = sttAudioCtx.createMediaStreamSource(sttStream);
            sttProcessor = sttAudioCtx.createScriptProcessor(4096, 1, 1);

            var targetSR = 16000;
            var resampleRatio = targetSR / nativeSR;

            // Connect to OUR backend WebSocket proxy (handles Smallest AI auth)
            sttSocket = new WebSocket(STT_WS_URL);

            sttSocket.onopen = function() {
                setVoiceState('listening');
                console.log('STT proxy connected, native SR:', nativeSR);
            };

            sttSocket.onmessage = function(event) {
                try {
                    var data = JSON.parse(event.data);
                    console.log('STT message:', data);
                    if (data.text && data.text.trim()) {
                        var transcript = data.text.trim();
                        stopListening();
                        processUserMessage(transcript);
                    }
                } catch (e) {
                    console.log('STT non-JSON:', event.data);
                }
            };

            sttSocket.onerror = function(e) {
                console.error('STT WebSocket error:', e);
                stopListening();
                // Fallback to push-to-talk
                addMessage('bot', 'Voice connection issue. Switching to push-to-talk mode.');
                setVoiceState('idle');
            };

            sttSocket.onclose = function(e) {
                console.log('STT closed:', e.code, e.reason);
            };

            isSpeechActive = false;
            silenceFrames = 0;
            speechFrames = 0;
            var sendCount = 0;

            sttProcessor.onaudioprocess = function(e) {
                if (!sttSocket || sttSocket.readyState !== WebSocket.OPEN) return;

                var input = e.inputBuffer.getChannelData(0);

                // Compute energy for VAD
                var energy = 0;
                for (var i = 0; i < input.length; i++) energy += input[i] * input[i];
                energy = Math.sqrt(energy / input.length);

                if (energy > 0.008) {
                    speechFrames++; silenceFrames = 0;
                    if (!isSpeechActive && speechFrames >= 3) isSpeechActive = true;
                } else {
                    silenceFrames++; speechFrames = 0;
                    if (isSpeechActive && silenceFrames >= 25) isSpeechActive = false;
                }

                if (isSpeechActive) {
                    // Resample from native rate to 16kHz
                    var outputLen = Math.round(input.length * resampleRatio);
                    var pcm = new Int16Array(outputLen);
                    for (var j = 0; j < outputLen; j++) {
                        var srcIdx = Math.min(Math.round(j / resampleRatio), input.length - 1);
                        pcm[j] = Math.max(-32768, Math.min(32767, Math.round(input[srcIdx] * 32767)));
                    }
                    sttSocket.send(pcm.buffer);
                    sendCount++;
                }
            };

            source.connect(sttProcessor);
            sttProcessor.connect(sttAudioCtx.destination);

        } catch (err) {
            console.error('STT error:', err);
            addMessage('bot', 'Microphone access needed. Please allow and try again.');
            setVoiceState('idle');
        }
    }

    function stopListening() {
        if (sttSocket) { sttSocket.close(); sttSocket = null; }
        if (sttStream) { sttStream.getTracks().forEach(function(t) { t.stop(); }); sttStream = null; }
        if (sttProcessor) { sttProcessor.disconnect(); sttProcessor = null; }
        if (sttAudioCtx) { sttAudioCtx.close().catch(function(){}); sttAudioCtx = null; }
    }

    /* ================================================================
     * Push-to-talk Fallback (Whisper via server)
     * ================================================================ */

    var mediaRecorder = null;
    var audioChunks = [];

    function startPushToTalk() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
            audioChunks = [];
            var types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/wav'];
            var mime = '';
            for (var i = 0; i < types.length; i++) { if (MediaRecorder.isTypeSupported(types[i])) { mime = types[i]; break; } }
            mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
            mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = function() {
                var blob = new Blob(audioChunks);
                stream.getTracks().forEach(function(t) { t.stop(); });
                mediaRecorder = null;
                setVoiceState('thinking');
                sendVoiceToServer(blob);
            };
            mediaRecorder.start();
            setVoiceState('listening');
        });
    }

    async function sendVoiceToServer(blob) {
        var fd = new FormData();
        fd.append('audio', blob, 'voice.wav');
        try {
            var res = await fetch('/api/voice', { method: 'POST', body: fd });
            if (res.ok) {
                var data = await res.json();
                if (data.transcript) addMessage('user', data.transcript);
                addMessage('bot', data.response);
                speak(data.response);
            }
        } catch (err) {
            addMessage('bot', 'Could not process voice. Please try typing.');
            setVoiceState('idle');
        }
    }

    /* ================================================================
     * Smallest AI TTS — Text-to-Speech
     * ================================================================ */

    async function speak(text) {
        if (!text) { setVoiceState('idle'); return; }

        setVoiceState('speaking');

        if (VOICE_ENABLED) {
            try {
                var cleanText = text.replace(/\*\*/g, '').replace(/#{1,3}\s/g, '').replace(/---/g, '').replace(/\n+/g, ' ').substring(0, 800);

                var fd = new FormData();
                fd.append('text', cleanText);
                var res = await fetch(TTS_URL, { method: 'POST', body: fd });

                if (!res.ok) throw new Error('TTS ' + res.status);

                var audioData = await res.arrayBuffer();
                if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: 24000 });
                var buffer = await playbackCtx.decodeAudioData(audioData);
                currentSource = playbackCtx.createBufferSource();
                currentSource.buffer = buffer;
                currentSource.connect(playbackCtx.destination);
                currentSource.onended = function() {
                    currentSource = null;
                    // Auto-listen again after speaking
                    if (voiceState === 'speaking') startListening();
                };
                currentSource.start();
                return;
            } catch (err) {
                console.warn('TTS fallback:', err);
            }
        }

        // No TTS available — just return to listening
        setTimeout(function() { startListening(); }, 500);
    }

    function stopSpeaking() {
        if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
    }

    /* ================================================================
     * Message Processing
     * ================================================================ */

    async function processUserMessage(text, imageUrl, imageBlob) {
        if (isProcessing) return;
        isProcessing = true;

        addMessage('user', text, imageUrl);
        setVoiceState('thinking');
        showThinking();

        try {
            var data;
            if (imageBlob) {
                var fd = new FormData();
                fd.append('image', imageBlob, 'photo.jpg');
                fd.append('text', text || '');
                var res = await fetch('/api/image', { method: 'POST', body: fd });
                data = await res.json();
            } else {
                var res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text }),
                });
                data = await res.json();
            }

            hideThinking();
            addMessage('bot', data.response);
            speak(data.response);
        } catch (err) {
            hideThinking();
            addMessage('bot', 'Something went wrong. Please try again.');
            setVoiceState('idle');
        }

        isProcessing = false;
    }

    /* ================================================================
     * Chat Rendering
     * ================================================================ */

    function addMessage(role, text, imageUrl) {
        var msg = document.createElement('div');
        msg.className = 'message ' + role;

        var bubble = document.createElement('div');
        bubble.className = 'bubble';

        if (imageUrl) {
            var img = document.createElement('img');
            img.src = imageUrl;
            bubble.appendChild(img);
        }

        if (text) {
            var div = document.createElement('div');
            div.innerHTML = renderMd(text);
            bubble.appendChild(div);
        }

        msg.appendChild(bubble);
        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    var thinkingEl = null;
    function showThinking() {
        thinkingEl = document.createElement('div');
        thinkingEl.className = 'message bot';
        thinkingEl.innerHTML = '<div class="bubble thinking-bubble"><span></span><span></span><span></span></div>';
        chatArea.appendChild(thinkingEl);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function hideThinking() {
        if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
    }

    function renderMd(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>')
            .replace(/^/, '<p>').replace(/$/, '</p>');
    }

    /* ================================================================
     * Text Input
     * ================================================================ */

    window.sendText = function() {
        var text = textInput.value.trim();
        if (!text) return;
        textInput.value = '';
        if (!hasStarted) {
            hasStarted = true;
            if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: 24000 });
        }
        processUserMessage(text);
    };

    /* ================================================================
     * Image Upload
     * ================================================================ */

    window.handleFileUpload = function(input) {
        var file = input.files[0];
        if (!file) return;
        var url = URL.createObjectURL(file);
        processUserMessage('', url, file);
        input.value = '';
    };

    /* ================================================================
     * Camera
     * ================================================================ */

    window.openCamera = async function() {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
            });
            document.getElementById('camVideo').srcObject = cameraStream;
            document.getElementById('cameraModal').classList.add('visible');
        } catch (err) {
            document.getElementById('fileInput').click();
        }
    };

    window.capturePhoto = function() {
        var video = document.getElementById('camVideo');
        var canvas = document.getElementById('camCanvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(function(blob) {
            var url = canvas.toDataURL('image/jpeg', 0.85);
            closeCamera();
            processUserMessage('', url, blob);
        }, 'image/jpeg', 0.85);
    };

    window.closeCamera = function() {
        document.getElementById('cameraModal').classList.remove('visible');
        if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; }
    };

    /* ================================================================
     * Init
     * ================================================================ */

    var hasStarted = false;

    window.toggleVoice = function() {
        // First tap: start conversation + enable audio
        if (!hasStarted) {
            hasStarted = true;
            playbackCtx = new AudioContext({ sampleRate: 24000 });
            processUserMessage('Hi');
            return;
        }

        if (voiceState === 'idle') {
            if (VOICE_ENABLED) {
                startListening();
            } else {
                startPushToTalk();
            }
        } else if (voiceState === 'listening') {
            stopListening();
            if (!VOICE_ENABLED && mediaRecorder) stopRecording();
            setVoiceState('idle');
        }
    };

    (function init() {
        if (VOICE_ENABLED) orbLabel.textContent = 'Tap to start voice';
        else orbLabel.textContent = 'Tap to start';

        // Show welcome prompt
        addMessage('bot', 'Tap the button above to start your child health assessment.');
    })();

})();
</script>
</body>
