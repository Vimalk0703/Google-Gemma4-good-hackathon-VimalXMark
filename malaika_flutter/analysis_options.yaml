# Dart analysis configuration for Malaika's Flutter Tier 0 app.
#
# This file is the source of truth for Dart linting. CI runs
# `flutter analyze` against this configuration on every push.
#
# Style rules below match the existing codebase. Tightening (require
# const, single-quotes, etc.) is welcome in a focused follow-up PR
# that also updates the existing files — not as a green-CI gate.
#
# https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Hard failures — these are real bugs.
    missing_required_param: error
    missing_return: error
    # Soft enforcement — surface in CI but don't break the build today.
    todo: ignore
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"

linter:
  rules:
    # --- existing project standard ---
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_single_quotes: true

    # --- correctness (don't conflict with existing style) ---
    avoid_empty_else: true
    avoid_relative_lib_imports: true
    cancel_subscriptions: true
    close_sinks: true
    control_flow_in_finally: true
    no_duplicate_case_values: true
    test_types_in_equals: true
    throw_in_finally: true
