name: malaika_flutter
description: >
  Malaika — WHO IMCI Child Health AI powered by Gemma 4.
  Fully offline on-device clinical assessment for iOS and Android.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # On-device Gemma 4 inference (Google's MediaPipe SDK)
  flutter_gemma: ^0.13.4

  # Speech-to-text (offline via native engines)
  speech_to_text: ^7.3.0

  # Text-to-speech (offline via native engines)
  flutter_tts: ^4.2.0

  # Camera and image handling
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Pure-Dart image resize/re-encode (Flutter's built-in only outputs PNG;
  # Gemma 4 vision adapter binds JPEG bytes correctly but not PNG).
  image: ^4.1.7

  # Storage and paths
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^12.0.1

  # HTTP for model download
  http: ^1.2.0

  # UI utilities
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
